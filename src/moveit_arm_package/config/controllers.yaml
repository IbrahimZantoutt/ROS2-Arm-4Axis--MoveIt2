# ros2_control controller configuration loaded by the gazebo_ros2_control
# plugin (see <parameters> tag in arm.urdf.xacro).
#
# This is the ROS 2 equivalent of the old ROS 1 "joint states + controllers"
# config. The controller_manager runs INSIDE Gazebo and spawns these.

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Publishes /joint_states from the simulated joints (ROS 2 name for the
    # old ROS 1 "joint_state_controller").
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Follows trajectories from MoveIt. The name "arm_controller" + the
    # follow_joint_trajectory action must match moveit_controllers.yaml.
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Controls the two gripper finger joints declared in the ros2_control block.
    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - spin_main_joint
      - shoulder_main_joint
      - elbow_main_joint
      - wrist_main_joint
      - forearm_main_joint
      - wrist_arm_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity

gripper_controller:
  ros__parameters:
    joints:
      - gripper_left_finger_joint
      - gripper_right_finger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
